[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-scripts --no-interaction",
  "npm install"
]

[phases.build]
cmds = [
  "printf 'APP_KEY=base64:x+nJJ60WJW4iJBZ5YHKJt2AFMf1H1I4jQbCPdPrCq7I=\\nAPP_URL=http://localhost\\nAPP_ENV=production\\n' > .env",
  "php artisan package:discover --ansi",
  "rm -f .env",
  "npm run build",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan config:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
